<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Insights | Next-Gen Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="blob shape-1"></div>
    <div class="blob shape-2"></div>

    <div class="container glass-panel">
        <header>
            <div class="logo-wrapper">
                <span class="icon">🚗</span>
                <h1>Vehicle Insights</h1>
            </div>
            <p class="subtitle">AI-Powered Vehicle Detection & Telemetry</p>
        </header>

        <main>
            <div class="upload-section glass-panel-inner" id="uploadDropzone">
                <div class="upload-content">
                    <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                        </path>
                    </svg>
                    <p>Drag and drop your media here</p>
                    <span class="divider">or</span>
                    <input type="file" id="fileInput" accept="image/*,video/*" hidden>
                    <button id="uploadBtn" class="btn btn-primary">Browse Files</button>
                </div>
            </div>

            <div id="loading" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Analyzing footage... Our neural network is working magic.</p>
            </div>

            <div class="result-section hidden" id="resultSection">
                <div class="result-header">
                    <h2>Analysis Complete</h2>
                    <a id="downloadCsvBtn" href="#" download class="btn btn-secondary">
                        <svg class="download-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        Download CSV Data
                    </a>
                </div>
                <div id="mediaContainer" class="media-container glass-panel-inner">
                </div>
            </div>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>

</html>
